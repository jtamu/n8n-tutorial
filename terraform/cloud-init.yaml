#cloud-config

package_update: true

packages:
  - docker
  - docker-compose
  - firewalld
  - git

runcmd:
  # Docker を有効化・起動
  - systemctl enable docker
  - systemctl start docker

  # opc ユーザーを docker グループに追加
  - usermod -aG docker opc

  # ファイアウォール設定
  - firewall-cmd --permanent --add-port=80/tcp
  - firewall-cmd --permanent --add-port=443/tcp
  - firewall-cmd --permanent --add-port=5678/tcp
  - firewall-cmd --reload

  # リポジトリをクローン
  - git clone https://github.com/jtamu/n8n-tutorial.git /opt/n8n
  - chown -R opc:opc /opt/n8n

  # Caddyfile を配置 (ドメインが指定されている場合)
%{ if n8n_domain != "" ~}
  - |
    cat > /opt/n8n/Caddyfile << 'CADDY'
    ${n8n_domain} {
      reverse_proxy n8n:5678
    }
    CADDY
%{ endif ~}

  # 本番用 .env を配置
  - |
    cat > /opt/n8n/.env.prod << 'ENVFILE'
    N8N_ENCRYPTION_KEY=${n8n_encryption_key}
    GENERIC_TIMEZONE=Asia/Tokyo
    TZ=Asia/Tokyo
    NODE_FUNCTION_ALLOW_EXTERNAL=pdfmake
%{ if n8n_domain != "" ~}
    N8N_HOST=${n8n_domain}
    N8N_PROTOCOL=https
    WEBHOOK_URL=https://${n8n_domain}/
%{ else ~}
    N8N_HOST=0.0.0.0
    N8N_PROTOCOL=http
%{ endif ~}
    ENVFILE

  # n8n を起動
%{ if n8n_domain != "" ~}
  - cd /opt/n8n && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
%{ else ~}
  - cd /opt/n8n && docker compose up -d
%{ endif ~}
