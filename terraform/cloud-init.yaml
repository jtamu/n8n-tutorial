#cloud-config

package_update: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - git

# ============================================================
# swap 設定 (e2-micro は 1GB RAM のため必須)
# ============================================================
swap:
  filename: /swapfile
  size: 1073741824  # 1GB
  maxsize: 1073741824

runcmd:
  # Docker 公式リポジトリからインストール
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

  # Docker を有効化・起動
  - systemctl enable docker
  - systemctl start docker

  # n8n ユーザーを docker グループに追加
  - usermod -aG docker n8n

  # リポジトリをクローン
  - git clone https://github.com/jtamu/n8n-tutorial.git /opt/n8n
  - chown -R n8n:n8n /opt/n8n

  # Caddyfile を配置 (ドメインが指定されている場合)
%{ if n8n_domain != "" ~}
  - |
    cat > /opt/n8n/Caddyfile << 'CADDY'
    {
      servers {
        trusted_proxies static 173.245.48.0/20 103.21.244.0/22 103.22.200.0/22 103.31.4.0/22 141.101.64.0/18 108.162.192.0/18 190.93.240.0/20 188.114.96.0/20 197.234.240.0/22 198.41.128.0/17 162.158.0.0/15 104.16.0.0/13 104.24.0.0/14 172.64.0.0/13 131.0.72.0/22
      }
    }
    ${n8n_domain} {
%{ if length(allowed_ips) > 0 ~}
      @blocked not client_ip ${join(" ", allowed_ips)}
      respond @blocked 403
%{ endif ~}
      reverse_proxy n8n:5678
    }
    CADDY
%{ endif ~}

  # .env を配置 (docker-compose.yml が参照)
  - |
    cat > /opt/n8n/.env << 'ENVFILE'
    N8N_ENCRYPTION_KEY=${n8n_encryption_key}
    GENERIC_TIMEZONE=Asia/Tokyo
    TZ=Asia/Tokyo
    NODE_FUNCTION_ALLOW_EXTERNAL=pdfmake
    N8N_HOST=0.0.0.0
    N8N_PROTOCOL=http
    ENVFILE

  # .env.prod を配置 (docker-compose.prod.yml が参照、ドメインありの場合のみ)
%{ if n8n_domain != "" ~}
  - |
    cat > /opt/n8n/.env.prod << 'ENVFILE'
    N8N_HOST=${n8n_domain}
    N8N_PROTOCOL=https
    WEBHOOK_URL=https://${n8n_domain}/
    ENVFILE
%{ endif ~}

  # n8n を起動
%{ if n8n_domain != "" ~}
  - cd /opt/n8n && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
%{ else ~}
  - cd /opt/n8n && docker compose up -d
%{ endif ~}
